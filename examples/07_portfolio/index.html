<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/main.js"></script>
  </head>
  <body>
    <header>
      <h1>나의 포트폴리오</h1>
      <button id="themeBtn">다크모드</button>
      <nav>
        <a href="#about">소개</a>
        <a href="#skills">기술</a>
        <a href="#projects">프로젝트</a>
        <a href="#contact">연락</a>
      </nav>
    </header>
    <main>
      <section id="about"><h2>소개</h2><p>꾸준히 배우는 개발자입니다.</p></section>
      <section id="skills"><h2>기술</h2><p>HTML, CSS, JavaScript</p></section>
      <section id="projects"><h2>프로젝트</h2><div id="repoList">로딩 중...</div></section>
      <section id="contact">
        <h2>연락</h2>
        <form id="contactForm">
          <label>이메일 <input id="email" type="email" required></label>
          <label>메시지 <textarea id="message" required></textarea></label>
          <button>보내기</button>
        </form>
        <p id="formResult"></p>
      </section>
    </main>
    <footer>2026 Portfolio</footer>
  </body>
</html>
